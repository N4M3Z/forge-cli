# forge-cli default configuration.
# Override: create config.yaml (gitignored) with only the fields you want to change.

providers:
    claude:
        target: ".claude"
        keep_fields:
            agents: [name, description, model, allowedTools]
            skills: [name, description, version]
            rules: []

    gemini:
        target: ".gemini"
        assembly:
            - kebab-case
            - remap-tools
        keep_fields:
            agents: [name, description]
            skills: [name, description, version]
            rules: []

    codex:
        target: ".codex"
        assembly:
            - agents-to-toml
        deploy:
            - rulesync
        keep_fields:
            agents: [name, description]
            skills: [name, description, version]
            rules: []

    opencode:
        target: ".opencode"
        assembly:
            - kebab-case
        keep_fields:
            agents: [name, description]
            skills: [name, description, version]
            rules: []
