name: CI

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]

jobs:
    validate:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6

            - uses: actions/setup-python@v6
              if: hashFiles('**/*.py') != ''
              with:
                  python-version: "3.12"

            - uses: dtolnay/rust-toolchain@stable
              if: hashFiles('**/*.rs') != ''

            - uses: actions/setup-node@v4
              if: hashFiles('**/*.ts', '**/*.tsx') != ''
              with:
                  node-version: "22"

            - name: Validate
              run: bash scripts/validate.sh
