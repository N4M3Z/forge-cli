name: Module Release

on:
    workflow_call:
        inputs:
            forge-version:
                description: "forge-cli version to use"
                type: string
                default: "latest"

permissions:
    contents: write

jobs:
    release:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6

            - uses: N4M3Z/forge-cli/.github/actions/setup-forge@main
              with:
                  version: ${{ inputs.forge-version }}

            - name: Validate
              run: make validate

            - name: Release
              run: forge release .

            - name: Create GitHub release
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  VERSION: ${{ github.ref_name }}
              run: gh release create "$VERSION" build/*.tar.gz --title "$VERSION" --generate-notes
