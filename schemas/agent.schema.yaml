$schema: https://json-schema.org/draft/2020-12/schema
type: object
required:
    - name
    - description
properties:
    name:
        type: string
        pattern: "^[A-Z][a-zA-Z0-9]{2,50}$"
    description:
        type: string
    model:
        type: string
    version:
        type: string
    allowedTools:
        type: array
        items:
            type: string
    targets:
        type: array
        items:
            type: string
